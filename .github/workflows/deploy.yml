name: Deploy Backend

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}

          script: |
            cd ~/SIPE/backend

            git fetch origin
            git reset --hard origin/main

            npm ci

            npx prisma generate

            npm run build

            pm2 restart sipe-backend --update-env

            sleep 5

            curl -f http://localhost:10000/health